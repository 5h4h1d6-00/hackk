<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Amount - UPI ScanPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">UPI ScanPro</h1>
    
    <div class="amount-box">
      <h2>Enter Amount</h2>
      <div class="rupee">₹</div>
      <input type="number" id="amountInput" placeholder="0.00" step="0.01" value="10">
      
      <button onclick="proceedToSuccess()" class="btn pay-btn">Proceed to Pay</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
